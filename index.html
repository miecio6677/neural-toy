<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural.toy | Minimal AI Grid</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Mono&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: black; color: white; }
        .tech-font { font-family: 'Space Mono', monospace; }
        
        /* Styl dla karty gry (siatka na dole) */
        .game-card {
            aspect-ratio: 16/9; /* Wszystkie obrazki będą miały te same proporcje */
            background-color: #050505; /* Prawie czarny, dla kontrastu */
            border: 1px solid #1a1a1a;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .game-card:hover {
            border-color: white;
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }
        
        /* Styl dla tekstu na środku karty */
        .game-title {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        .game-card:hover .game-title {
            opacity: 1;
        }
        
        /* Styl dla małej strzałeczki w rogu */
        .arrow-icon {
            opacity: 0.3;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .game-card:hover .arrow-icon {
            opacity: 1;
            transform: translate(3px, -3px);
        }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <div id="app" class="flex flex-col min-h-screen">
        
        <header class="max-w-7xl mx-auto w-full px-6 py-12 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-3">
                <i data-lucide="folder" class="w-7 h-7 text-white/50"></i>
                <h1 class="tech-font text-xl font-bold tracking-tighter text-white/90">
                    NEURAL.<span class="text-white">TOY</span>
                </h1>
            </div>
            <div class="flex items-center gap-10 text-[10px] uppercase text-white/40 tech-font tracking-[0.2em]">
                <a href="#" class="flex flex-col items-center gap-3 hover:text-white transition-colors group">
                    <i data-lucide="image" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                    Intro
                </a>
                <a href="#" class="flex flex-col items-center gap-3 hover:text-white transition-colors group">
                    <i data-lucide="folder-plus" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                    Docs
                </a>
                <a href="#" class="flex flex-col items-center gap-3 hover:text-white transition-colors group">
                    <i data-lucide="activity" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                    Rewards
                </a>
            </div>
        </header>

        <main class="max-w-7xl mx-auto w-full px-6 py-16 flex-grow">
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="game-grid">
                
                <a href="/games/Tower-Defence-Revege/index.html" class="game-card group rounded-2xl relative flex items-center justify-center">
                    
                    <img src="https://images.unsplash.com/photo-1620712943543-bcc4688e7485?q=80&w=600&auto=format&fit=crop" 
                         alt="Neural Roast AI" 
                         class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
                    
                    <div class="absolute inset-0 bg-black/60 group-hover:bg-black/30 transition-colors duration-300"></div>

                    <div class="game-title relative z-10 text-center">
                        <span class="tech-font text-white text-[11px] uppercase tracking-[0.3em]">AI Module</span>
                        <h3 class="text-3xl font-extrabold text-white mt-1">Neural Roast</h3>
                    </div>

                    <div class="absolute bottom-4 right-4 z-10 flex items-center gap-2 text-white/50 tech-font text-[10px] uppercase">
                        Launch <i data-lucide="arrow-up-right" class="w-4 h-4 arrow-icon"></i>
                    </div>
                </a>

                <div class="game-card group rounded-2xl relative flex items-center justify-center opacity-50">
                    <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?q=80&w=600&auto=format&fit=crop" 
                         alt="Money Printer" 
                         class="absolute inset-0 w-full h-full object-cover grayscale">
                    <div class="absolute inset-0 bg-black/70"></div>
                    <div class="game-title relative z-10 text-center">
                        <span class="tech-font text-white text-[11px] uppercase tracking-[0.3em]">Module_Locked</span>
                        <h3 class="text-3xl font-extrabold text-white mt-1">Money Printer</h3>
                    </div>
                </div>

                <div class="game-card rounded-2xl flex flex-col items-center justify-center text-center p-8 border-dashed border-white/10 bg-transparent hover:border-white transition-all opacity-30">
                    <i data-lucide="plus-circle" class="w-10 h-10 text-white/30 mb-4"></i>
                    <h3 class="text-lg font-bold text-white/50">Submit Idea</h3>
                    <p class="tech-font text-[10px] text-white/30 mt-1 uppercase tracking-widest">New Module</p>
                </div>

            </div>
        </main>

        <footer class="max-w-7xl mx-auto w-full px-6 py-10 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6">
            <p class="tech-font text-[10px] text-white/20 uppercase tracking-[0.3em]">© 2026 / Neural.Toy Labs</p>
            <div class="flex gap-8 text-white/30">
                <a href="#" class="hover:text-white transition-colors"><i data-lucide="github" class="w-5 h-5"></i></a>
                <a href="#" class="hover:text-white transition-colors"><i data-lucide="mail" class="w-5 h-5"></i></a>
            </div>
        </footer>

    </div>

    <script type="module" src="/main.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
