<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Deep Dark Tech TD</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000000;
      --primary: #6366f1;
      --enemy: #f97373;
      --hud-bg: rgba(15, 23, 42, 0.7);
      --hud-border: rgba(148, 163, 184, 0.4);
    }
    body {
      background: var(--bg);
      color: #e5e7eb;
      font-family: "Inter", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .font-mono {
      font-family: "Space Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    canvas {
      background: #000;
      display: block;
    }
    .btn-tower {
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn-tower:hover {
      transform: translateY(-1px);
      box-shadow: 0 0 12px rgba(99, 102, 241, 0.6);
    }
    .btn-tower.active {
      background: rgba(99, 102, 241, 0.2);
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.8);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">
  <div class="w-full max-w-5xl mx-auto px-4 py-6">
    <!-- HUD -->
    <div class="flex flex-col gap-3 mb-3">
      <div class="flex items-center justify-between rounded border border-slate-600/40 bg-slate-900/60 px-4 py-2 text-xs sm:text-sm">
        <div class="flex items-center gap-4">
          <div class="font-mono tracking-tight">
            Data Fragments:
            <span id="hud-money" class="text-indigo-400 font-semibold">0</span>
          </div>
          <div class="font-mono tracking-tight">
            Wave:
            <span id="hud-wave" class="text-slate-200">1</span>
          </div>
          <div class="font-mono tracking-tight">
            Core Integrity:
            <span id="hud-lives" class="text-rose-400">20</span>
          </div>
        </div>
        <div class="hidden sm:flex items-center gap-2 text-[0.65rem] text-slate-400">
          <span>Click to place towers • Enemies follow the white path • Don’t build on the path</span>
        </div>
      </div>

      <!-- Tower selection -->
      <div class="flex flex-wrap gap-2 rounded border border-slate-600/40 bg-slate-900/60 px-3 py-2 text-xs sm:text-sm">
        <button data-tower="pulse"
          class="btn-tower active flex-1 min-w-[7rem] border border-indigo-400/40 rounded px-2 py-1 flex flex-col text-left">
          <span class="font-mono text-indigo-300">Basic Pulse</span>
          <span class="text-[0.65rem] text-slate-400">Fast, low damage</span>
          <span class="text-[0.65rem] text-slate-500 mt-1">Cost: 40</span>
        </button>
        <button data-tower="beam"
          class="btn-tower flex-1 min-w-[7rem] border border-indigo-400/40 rounded px-2 py-1 flex flex-col text-left">
          <span class="font-mono text-indigo-300">Heavy Beam</span>
          <span class="text-[0.65rem] text-slate-400">Slow, high damage laser</span>
          <span class="text-[0.65rem] text-slate-500 mt-1">Cost: 80</span>
        </button>
        <button data-tower="slow"
          class="btn-tower flex-1 min-w-[7rem] border border-indigo-400/40 rounded px-2 py-1 flex flex-col text-left">
          <span class="font-mono text-indigo-300">Slowing Field</span>
          <span class="text-[0.65rem] text-slate-400">Slows enemies in range</span>
          <span class="text-[0.65rem] text-slate-500 mt-1">Cost: 70</span>
        </button>
      </div>
    </div>

    <!-- Game container -->
    <div class="relative border border-slate-700/60 rounded-lg overflow-hidden bg-black">
      <canvas id="game" class="w-full h-[60vh] sm:h-[65vh]"></canvas>

      <!-- Game Over overlay -->
      <div id="game-over"
           class="pointer-events-none opacity-0 transition-opacity duration-300 absolute inset-0 flex items-center justify-center bg-black/80">
        <div class="border border-slate-600/60 bg-slate-900/80 px-6 py-5 rounded-lg text-center max-w-xs">
          <div class="font-mono text-lg text-rose-400 mb-2">CORE BREACHED</div>
          <p class="text-xs text-slate-300 mb-4">
            The data stream was overwhelmed. Recalibrate your defenses and try again.
          </p>
          <button id="retry-btn"
                  class="pointer-events-auto inline-flex items-center justify-center px-4 py-1.5 rounded border border-indigo-400/60 text-xs font-mono text-indigo-200 hover:bg-indigo-500/10">
            Retry Simulation
          </button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Tailwind config (minimal)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#6366f1",
          },
        },
      },
    };

    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const hudMoney = document.getElementById("hud-money");
    const hudWave = document.getElementById("hud-wave");
    const hudLives = document.getElementById("hud-lives");
    const gameOverEl = document.getElementById("game-over");
    const retryBtn = document.getElementById("retry-btn");

    const towerButtons = Array.from(document.querySelectorAll("[data-tower]"));

    let width = 800;
    let height = 450;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const dpr = window.devicePixelRatio || 1;
      width = rect.width * dpr;
      height = rect.height * dpr;
      canvas.width = width;
      canvas.height = height;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    // Game state
    let money, lives, wave, enemies, towers, projectiles, particles, path, spawnTimer, spawnInterval, enemiesToSpawn, gameRunning, lastTime;
    let selectedTowerType = "pulse";

    const TOWER_COST = {
      pulse: 40,
      beam: 80,
      slow: 70,
    };

    const ENEMY_BASE_HP = 40;
    const ENEMY_BASE_SPEED = 40; // px/s

    function initPath() {
      // Elegant winding path as normalized points (0..1) then scaled
      const pts = [
        [0.02, 0.5],
        [0.18, 0.2],
        [0.35, 0.25],
        [0.5, 0.15],
        [0.65, 0.3],
        [0.8, 0.25],
        [0.92, 0.55],
        [0.75, 0.75],
        [0.55, 0.7],
        [0.35, 0.8],
        [0.15, 0.7],
        [0.02, 0.9],
      ];
      return pts.map(([x, y]) => ({ x: x * width, y: y * height }));
    }

    function resetGame() {
      money = 120;
      lives = 20;
      wave = 1;
      enemies = [];
      towers = [];
      projectiles = [];
      particles = [];
      path = initPath();
      spawnTimer = 0;
      spawnInterval = 1.0;
      enemiesToSpawn = 10;
      gameRunning = true;
      lastTime = performance.now();
      gameOverEl.classList.remove("opacity-100");
      gameOverEl.classList.add("opacity-0");
      gameOverEl.classList.add("pointer-events-none");
      updateHUD();
    }

    function updateHUD() {
      hudMoney.textContent = Math.floor(money);
      hudWave.textContent = wave;
      hudLives.textContent = lives;
    }

    function distance(a, b) {
      const dx = a.x - b.x;
      const dy = a.y - b.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function lerp(a, b, t) {
      return a + (b - a) * t;
    }

    function spawnEnemy() {
      const hp = ENEMY_BASE_HP + wave * 10;
      const speed = ENEMY_BASE_SPEED + wave * 2;
      enemies.push({
        x: path[0].x,
        y: path[0].y,
        hp,
        maxHp: hp,
        speed,
        pathIndex: 0,
        t: 0,
        slowFactor: 1,
      });
    }

    function nextWave() {
      wave++;
      enemiesToSpawn = 8 + wave * 2;
      spawnInterval = Math.max(0.35, 1.0 - wave * 0.03);
      spawnTimer = 0;
      updateHUD();
    }

    function worldPosFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      const x = (e.clientX - rect.left);
      const y = (e.clientY - rect.top);
      return { x, y };
    }

    function isOnPath(pos) {
      // Check distance to each segment; if < threshold, treat as on path
      const threshold = 22;
      for (let i = 0; i < path.length - 1; i++) {
        const a = { x: path[i].x / (window.devicePixelRatio || 1), y: path[i].y / (window.devicePixelRatio || 1) };
        const b = { x: path[i + 1].x / (window.devicePixelRatio || 1), y: path[i + 1].y / (window.devicePixelRatio || 1) };
        const vx = b.x - a.x;
        const vy = b.y - a.y;
        const wx = pos.x - a.x;
        const wy = pos.y - a.y;
        const c1 = vx * wx + vy * wy;
        const c2 = vx * vx + vy * vy;
        let t = 0;
        if (c2 > 0) t = Math.max(0, Math.min(1, c1 / c2));
        const proj = { x: a.x + t * vx, y: a.y + t * vy };
        if (distance(pos, proj) < threshold) return true;
      }
      return false;
    }

    function addTower(pos, type) {
      const cost = TOWER_COST[type];
      if (money < cost) return;
      if (isOnPath(pos)) return;

      const base = {
        x: pos.x,
        y: pos.y,
        type,
        cooldown: 0,
        range: 110,
        level: 1,
      };

      if (type === "pulse") {
        base.fireRate = 4; // shots per second
        base.damage = 10;
        base.range = 130;
      } else if (type === "beam") {
        base.fireRate = 0.8;
        base.damage = 40;
        base.range = 160;
      } else if (type === "slow") {
        base.fireRate = 0; // aura
        base.damage = 0;
        base.range = 120;
        base.slowAmount = 0.45;
      }

      towers.push(base);
      money -= cost;
      updateHUD();
    }

    canvas.addEventListener("click", (e) => {
      if (!gameRunning) return;
      const pos = worldPosFromEvent(e);
      addTower(pos, selectedTowerType);
    });

    towerButtons.forEach(btn => {
      btn.addEventListener("click", () => {
        towerButtons.forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        selectedTowerType = btn.dataset.tower;
      });
    });

    retryBtn.addEventListener("click", () => {
      resetGame();
    });

    function gameOver() {
      gameRunning = false;
      gameOverEl.classList.remove("pointer-events-none");
      gameOverEl.classList.remove("opacity-0");
      gameOverEl.classList.add("opacity-100");
    }

    // Particles
    function spawnParticles(x, y, color) {
      for (let i = 0; i < 10; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = 40 + Math.random() * 80;
        particles.push({
          x,
          y,
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          life: 0.4 + Math.random() * 0.3,
          age: 0,
          color,
        });
      }
    }

    function updateParticles(dt) {
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.age += dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.vx *= 0.96;
        p.vy *= 0.96;
        if (p.age >= p.life) {
          particles.splice(i, 1);
        }
      }
    }

    function drawParticles() {
      particles.forEach(p => {
        const t = 1 - p.age / p.life;
        ctx.globalAlpha = t * 0.9;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.2 * t, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      });
    }

    // Enemy update
    function updateEnemies(dt) {
      for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        e.slowFactor = 1; // reset; towers will reapply

        const current = path[e.pathIndex];
        const next = path[e.pathIndex + 1];
        if (!next) {
          // reached end
          enemies.splice(i, 1);
          lives -= 1;
          updateHUD();
          if (lives <= 0) gameOver();
          continue;
        }

        const dx = next.x - current.x;
        const dy = next.y - current.y;
        const segLen = Math.sqrt(dx * dx + dy * dy) || 1;
        const speed = e.speed * e.slowFactor;
        const move = speed * dt;
        const advance = move / segLen;

        e.t += advance;
        if (e.t >= 1) {
          e.pathIndex++;
          e.t = 0;
          e.x = next.x;
          e.y = next.y;
        } else {
          e.x = current.x + dx * e.t;
          e.y = current.y + dy * e.t;
        }
      }

      if (enemies.length === 0 && enemiesToSpawn <= 0 && gameRunning) {
        nextWave();
      }
    }

    // Projectiles
    function updateProjectiles(dt) {
      for (let i = projectiles.length - 1; i >= 0; i--) {
        const p = projectiles[i];
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.life -= dt;
        if (p.life <= 0) {
          projectiles.splice(i, 1);
          continue;
        }

        // collision
        for (let j = enemies.length - 1; j >= 0; j--) {
          const e = enemies[j];
          if (distance(p, e) < 10) {
            e.hp -= p.damage;
            spawnParticles(e.x, e.y, "rgba(249,115,115,0.9)");
            projectiles.splice(i, 1);
            if (e.hp <= 0) {
              money += 8 + wave * 1.5;
              updateHUD();
              enemies.splice(j, 1);
            }
            break;
          }
        }
      }
    }

    // Towers
    function updateTowers(dt) {
      towers.forEach(t => {
        t.cooldown -= dt;
        if (t.type === "slow") {
          // apply slow aura
          enemies.forEach(e => {
            if (distance(t, e) <= t.range) {
              e.slowFactor = Math.min(e.slowFactor, t.slowAmount);
            }
          });
          return;
        }

        if (t.cooldown > 0) return;

        // find target
        let target = null;
        let bestProgress = -1;
        enemies.forEach(e => {
          const d = distance(t, e);
          if (d <= t.range) {
            const progress = e.pathIndex + e.t;
            if (progress > bestProgress) {
              bestProgress = progress;
              target = e;
            }
          }
        });

        if (!target) return;

        if (t.type === "pulse") {
          const angle = Math.atan2(target.y - t.y, target.x - t.x);
          const speed = 260;
          projectiles.push({
            x: t.x,
            y: t.y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed,
            life: 1.2,
            damage: t.damage,
            type: "pulse",
          });
          t.cooldown = 1 / t.fireRate;
        } else if (t.type === "beam") {
          // instant damage + beam visual
          target.hp -= t.damage;
          spawnParticles(target.x, target.y, "rgba(129,140,248,0.9)");
          // store a short-lived beam effect as projectile-like
          projectiles.push({
            x: t.x,
            y: t.y,
            tx: target.x,
            ty: target.y,
            life: 0.08,
            type: "beam",
          });
          if (target.hp <= 0) {
            money += 10 + wave * 2;
            updateHUD();
            const idx = enemies.indexOf(target);
            if (idx >= 0) enemies.splice(idx, 1);
          }
          t.cooldown = 1 / t.fireRate;
        }
      });
    }

    function drawPath() {
      ctx.save();
      ctx.lineWidth = 10;
      ctx.lineCap = "round";
      ctx.strokeStyle = "rgba(148,163,184,0.35)";
      ctx.beginPath();
      for (let i = 0; i < path.length; i++) {
        const p = path[i];
        const x = p.x / (window.devicePixelRatio || 1);
        const y = p.y / (window.devicePixelRatio || 1);
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.stroke();
      ctx.restore();
    }

    function drawEnemies() {
      enemies.forEach(e => {
        const x = e.x / (window.devicePixelRatio || 1);
        const y = e.y / (window.devicePixelRatio || 1);

        // glow
        const grd = ctx.createRadialGradient(x, y, 0, x, y, 18);
        grd.addColorStop(0, "rgba(248,113,113,0.9)");
        grd.addColorStop(1, "rgba(248,113,113,0.0)");
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(x, y, 18, 0, Math.PI * 2);
        ctx.fill();

        // core
        ctx.fillStyle = "#f97373";
        ctx.beginPath();
        ctx.arc(x, y, 9, 0, Math.PI * 2);
        ctx.fill();

        // HP bar
        const w = 24;
        const h = 3;
        const hpRatio = e.hp / e.maxHp;
        ctx.fillStyle = "rgba(15,23,42,0.9)";
        ctx.fillRect(x - w / 2, y - 14, w, h);
        ctx.fillStyle = "#22c55e";
        ctx.fillRect(x - w / 2, y - 14, w * hpRatio, h);
      });
    }

    function drawTowers() {
      towers.forEach(t => {
        const x = t.x / (window.devicePixelRatio || 1);
        const y = t.y / (window.devicePixelRatio || 1);

        // range (subtle)
        ctx.save();
        ctx.strokeStyle = "rgba(99,102,241,0.08)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(x, y, t.range, 0, Math.PI * 2);
        ctx.stroke();
        ctx.restore();

        // base
        ctx.save();
        const size = 16;
        const grd = ctx.createRadialGradient(x, y, 0, x, y, size);
        grd.addColorStop(0, "rgba(129,140,248,1)");
        grd.addColorStop(1, "rgba(79,70,229,0.1)");
        ctx.fillStyle = grd;
        ctx.strokeStyle = "rgba(129,140,248,0.9)";
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.roundRect(x - size / 2, y - size / 2, size, size, 4);
        ctx.fill();
        ctx.stroke();

        // type indicator
        ctx.fillStyle = "#0f172a";
        ctx.font = "8px 'Space Mono'";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        let label = "P";
        if (t.type === "beam") label = "B";
        else if (t.type === "slow") label = "S";
        ctx.fillText(label, x, y + 0.5);
        ctx.restore();
      });
    }

    function drawProjectiles() {
      projectiles.forEach(p => {
        if (p.type === "beam") {
          const x1 = p.x / (window.devicePixelRatio || 1);
          const y1 = p.y / (window.devicePixelRatio || 1);
          const x2 = p.tx / (window.devicePixelRatio || 1);
          const y2 = p.ty / (window.devicePixelRatio || 1);
          ctx.save();
          const alpha = Math.max(0, p.life / 0.08);
          ctx.strokeStyle = `rgba(129,140,248,${0.7 * alpha})`;
          ctx.lineWidth = 3;
          ctx.shadowColor = "rgba(129,140,248,0.9)";
          ctx.shadowBlur = 12;
          ctx.beginPath();
          ctx.moveTo(x1, y1);
          ctx.lineTo(x2, y2);
          ctx.stroke();
          ctx.restore();
        } else {
          const x = p.x / (window.devicePixelRatio || 1);
          const y = p.y / (window.devicePixelRatio || 1);
          ctx.save();
          const alpha = Math.max(0, p.life / 1.2);
          ctx.fillStyle = `rgba(129,140,248,${0.9 * alpha})`;
          ctx.shadowColor = "rgba(129,140,248,0.9)";
          ctx.shadowBlur = 8;
          ctx.beginPath();
          ctx.arc(x, y, 4, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      });
    }

    function drawBackground() {
      ctx.fillStyle = "#000000";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // subtle tech grid
      ctx.save();
      ctx.strokeStyle = "rgba(30,64,175,0.12)";
      ctx.lineWidth = 0.5;
      const step = 32;
      for (let x = 0; x < canvas.width; x += step) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y < canvas.height; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
      }
      ctx.restore();
    }

    function update(dt) {
      if (!gameRunning) return;

      spawnTimer += dt;
      if (enemiesToSpawn > 0 && spawnTimer >= spawnInterval) {
        spawnTimer -= spawnInterval;
        spawnEnemy();
        enemiesToSpawn--;
      }

      updateEnemies(dt);
      updateTowers(dt);
      updateProjectiles(dt);
      updateParticles(dt);
    }

    function render() {
      drawBackground();
      drawPath();
      drawProjectiles();
      drawTowers();
      drawEnemies();
      drawParticles();
    }

    function loop(timestamp) {
      const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
      lastTime = timestamp;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    // Polyfill for roundRect if needed
    if (!CanvasRenderingContext2D.prototype.roundRect) {
      CanvasRenderingContext2D.prototype.roundRect = function (x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.beginPath();
        this.moveTo(x + r, y);
        this.arcTo(x + w, y, x + w, y + h, r);
        this.arcTo(x + w, y + h, x, y + h, r);
        this.arcTo(x, y + h, x, y, r);
        this.arcTo(x, y, x + w, y, r);
        this.closePath();
        return this;
      };
    }

    resetGame();
    requestAnimationFrame((t) => {
      lastTime = t;
      requestAnimationFrame(loop);
    });
  </script>
</body>
</html>
